# Cloud Build config for Google Cloud Run continuous deployment
# Region: europe-west1 | Service: promptwarvirtual
# Project: promptwarvirtual-493703
#
# Set these substitution variables in Cloud Build Trigger settings:
#   _NEXT_PUBLIC_SUPABASE_URL
#   _NEXT_PUBLIC_SUPABASE_ANON_KEY
#   _NEXT_PUBLIC_VAPID_PUBLIC_KEY

steps:
  # ── Step 1: Build the Docker image ───────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build'
    args:
      - 'build'
      - '--tag'
      - 'gcr.io/$PROJECT_ID/promptwarvirtual:$COMMIT_SHA'
      - '--tag'
      - 'gcr.io/$PROJECT_ID/promptwarvirtual:latest'
      - '--build-arg'
      - 'NEXT_PUBLIC_SUPABASE_URL=${_NEXT_PUBLIC_SUPABASE_URL}'
      - '--build-arg'
      - 'NEXT_PUBLIC_SUPABASE_ANON_KEY=${_NEXT_PUBLIC_SUPABASE_ANON_KEY}'
      - '--build-arg'
      - 'NEXT_PUBLIC_VAPID_PUBLIC_KEY=${_NEXT_PUBLIC_VAPID_PUBLIC_KEY}'
      - '.'

  # ── Step 2: Push to Container Registry ───────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push'
    args:
      - 'push'
      - '--all-tags'
      - 'gcr.io/$PROJECT_ID/promptwarvirtual'

  # ── Step 3: Deploy to Cloud Run ───────────────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'promptwarvirtual'
      - '--image'
      - 'gcr.io/$PROJECT_ID/promptwarvirtual:$COMMIT_SHA'
      - '--region'
      - 'europe-west1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '3000'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '10'
      # Server-side secrets (from GCP Secret Manager)
      - '--set-env-vars'
      - 'NEXT_PUBLIC_SUPABASE_URL=${_NEXT_PUBLIC_SUPABASE_URL},NEXT_PUBLIC_SUPABASE_ANON_KEY=${_NEXT_PUBLIC_SUPABASE_ANON_KEY}'

images:
  - 'gcr.io/$PROJECT_ID/promptwarvirtual:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/promptwarvirtual:latest'

options:
  logging: CLOUD_LOGGING_ONLY
